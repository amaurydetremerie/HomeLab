name: Changelog

on:
  push:
    branches: [main]

jobs:
  changelog:
    runs-on: k3s
    env:
      GITEA_URL: https://git.wiserisk.be
      GITEA_REPO: wiserisk/HomeLab
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get commits since last tag
        id: commits
        shell: bash
        run: |
          LAST_REF=$(git describe --tags --abbrev=0 2>/dev/null || git rev-list --max-parents=0 HEAD)
          COMMITS=$(git log "${LAST_REF}..HEAD" --oneline 2>/dev/null || true)

          if [ -z "$COMMITS" ]; then
            echo "empty=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "empty=false" >> "$GITHUB_OUTPUT"
          {
            echo "list<<EOF"
            echo "$COMMITS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Generate changelog with Claude
        id: generate
        if: steps.commits.outputs.empty != 'true'
        uses: ./.gitea/actions/claude-prompt
        with:
          allowed_tools: ""
          prompt: |
            Génère un changelog structuré et concis en français à partir de ces commits Git d'un repo HomeLab IaC.

            COMMITS:
            ${{ steps.commits.outputs.list }}

            Instructions :
            - Organise les changements en sections Markdown (### Titre) selon ce qui fait sens pour les commits
            - Une ligne par changement
            - Ignore les commits de merge, de style et les [skip ci]
            - Sois concis
            - Ne génère pas de titre ## Changelog ni de date — juste les sections et leurs entrées

      - name: Compute release tag
        id: tag
        if: steps.commits.outputs.empty != 'true'
        shell: bash
        run: echo "value=v$(date +%Y.%m.%d)-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Setup git
        if: steps.commits.outputs.empty != 'true'
        shell: bash
        run: |
          git config user.name "Gitea Actions"
          git config user.email "actions@wiserisk.be"
          git remote set-url origin "https://wiserisk:${{ secrets.HOMELAB_TOKEN }}@git.wiserisk.be/wiserisk/HomeLab.git"

      - name: Create tag and Gitea release
        if: steps.commits.outputs.empty != 'true'
        shell: bash
        run: |
          TAG="${{ steps.tag.outputs.value }}"
          CHANGELOG="${{ steps.generate.outputs.result }}"

          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

          curl -sf -X POST "${GITEA_URL}/api/v1/repos/${GITEA_REPO}/releases" \
            -H "Authorization: token ${{ secrets.HOMELAB_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg tag "$TAG" --arg body "$CHANGELOG" \
              '{tag_name: $tag, name: $tag, body: $body, draft: false, prerelease: false}')"

      - name: Update CHANGELOG.md
        if: steps.commits.outputs.empty != 'true'
        shell: bash
        run: |
          TAG="${{ steps.tag.outputs.value }}"
          CHANGELOG="${{ steps.generate.outputs.result }}"

          python3 - "$TAG" "$CHANGELOG" <<'PYEOF'
          import sys

          tag, entry = sys.argv[1], sys.argv[2]
          new_section = f"## {tag}\n\n{entry}\n"

          try:
              content = open("CHANGELOG.md").read()
              if content.startswith("# Changelog\n"):
                  rest = content[len("# Changelog\n"):]
                  content = "# Changelog\n\n" + new_section + "\n" + rest.lstrip("\n")
              else:
                  content = "# Changelog\n\n" + new_section + "\n" + content
          except FileNotFoundError:
              content = "# Changelog\n\n" + new_section

          open("CHANGELOG.md", "w").write(content)
          PYEOF

          git add CHANGELOG.md
          git commit -m "docs: update CHANGELOG.md [$TAG] [skip ci]"
          git push origin main
