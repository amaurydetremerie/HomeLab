name: Monitoring gap check

on:
  push:
    branches: [main]

jobs:
  check:
    runs-on: k3s
    env:
      GITEA_URL: https://git.wiserisk.be
      GITEA_REPO: wiserisk/HomeLab
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for diff
        id: check
        shell: bash
        run: |
          if git diff "${{ github.event.before }}" HEAD --quiet; then
            echo "has_diff=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_diff=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Analyze diff with Claude
        id: claude
        if: steps.check.outputs.has_diff == 'true'
        uses: ./.gitea/actions/claude-prompt
        with:
          allowed_tools: "Bash,Read"
          prompt: |
            Tu analyses le dernier commit d'un repo HomeLab IaC.

            Exécute `git diff ${{ github.event.before }} HEAD` pour voir les changements.

            Configs monitoring actuelles :
            @K3S/monitoring/Prometheus/scrape.yaml
            @K3S/monitoring/Prometheus/rules.yaml
            @K3S/monitoring/Blackbox/config-map.yaml

            Si le diff introduit de nouvelles IPs, URLs, services ou hosts absents des configs monitoring, réponds uniquement :
            Monitoring manquant pour :
            - <élément>

            Si tout est couvert ou si le diff ne touche pas à des ressources réseau/infra, réponds exactement NO_GAP.

      - name: Evaluate result
        id: evaluate
        if: steps.check.outputs.has_diff == 'true'
        shell: bash
        run: |
          CONTENT="${{ steps.claude.outputs.result }}"
          if [ "$CONTENT" = "NO_GAP" ]; then
            echo "has_gap=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_gap=true" >> "$GITHUB_OUTPUT"
            {
              echo "gap_description<<EOF"
              echo "$CONTENT"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Create Gitea issue for monitoring gap
        if: steps.evaluate.outputs.has_gap == 'true'
        shell: bash
        run: |
          DESCRIPTION="${{ steps.evaluate.outputs.gap_description }}"
          COMMIT_SHA="${{ github.sha }}"

          ISSUE_BODY=$(jq -n \
            --arg desc "$DESCRIPTION" \
            --arg sha "$COMMIT_SHA" \
            '{
              title: ("Monitoring gap — " + $sha[:8]),
              body: ("**Commit :** `" + $sha + "`\n\n" + $desc + "\n\n---\n*Généré automatiquement par le workflow monitoring-check.*"),
              labels: ["monitoring-gap"]
            }')

          curl -sf -X POST "${GITEA_URL}/api/v1/repos/${GITEA_REPO}/issues" \
            -H "Authorization: token ${{ secrets.HOMELAB_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "$ISSUE_BODY"
