---
all:
  children:
    homelab:
      children:

        # ── Proxmox ─────────────────────────────────────────────────────────
        # ansible_user: root — Proxmox et PBS nécessitent root pour l'administration
        proxmox:
          children:
            proxmox_hypervisors:
              hosts:
                proxmox_flash:
                  ansible_host: 10.0.0.81
                proxmox_wasp:
                  ansible_host: 10.0.0.82
            proxmox_pbs:
              hosts:
                pbs:
                  ansible_host: 10.0.0.80

        # ── TrueNAS ─────────────────────────────────────────────────────────
        # ansible_user: root — TrueNAS gère ses propres utilisateurs, pas de hardening standard
        truenas:
          hosts:
            truenas_hermes:
              ansible_host: 10.100.0.10        # VM
            truenas_hades:
              ansible_host: 192.168.1.119       # Bare metal, réseau séparé

        # ── Machines Linux gérées (post-hardening : ansible user) ────────────
        # ansible_user: ansible — voir group_vars/linux_managed/vars.yml
        # Hardening applicable : rôle hardening + niveaux 1/2/3
        linux_managed:
          children:

            k3s_masters:
              hosts:
                k3s_master:
                  ansible_host: 10.100.0.151        # VM Debian

            k3s_workers:
              hosts:
                k3s_worker:
                  ansible_host: 10.100.0.152        # VM Debian

            lxc:
              children:
                adguard:
                  hosts:
                    adguard_wasp:
                      ansible_host: 10.0.0.86
                    adguard_flash:
                      ansible_host: 10.0.0.88
                unbound:
                  hosts:
                    unbound_wasp:
                      ansible_host: 10.0.0.87
                    unbound_flash:
                      ansible_host: 10.0.0.89
                traefik: # Passerelle vmbr0 ↔ vmbr1
                  hosts:
                    traefik_wasp:
                      ansible_host: 10.0.0.84
                    traefik_flash:
                      ansible_host: 10.0.0.85
              hosts:
                semaphore:
                  ansible_host: 10.100.0.106
                gitea:
                  ansible_host: 10.100.0.107
                webhook:
                  ansible_host: 10.100.0.103
                ollama:
                  ansible_host: 10.100.0.104
                qbittorrent:
                  ansible_host: 10.100.0.105
                seedbox:
                  ansible_host: 10.100.0.201
                jellyfin:
                  ansible_host: 10.100.0.202
                tailscale:
                  ansible_host: 10.100.0.220          # Proxy vers réseau 192.168.1.x (Hades)
                gatus:
                  ansible_host: 10.100.0.108

            vps:
              hosts:
                debian_vps:
                  ansible_host: x.x.x.x               # À remplacer

        # ── HomeAssistant OS ─────────────────────────────────────────────────
        # HAOS = OS propriétaire, pas de gestion utilisateur standard — pas de hardening
        # ansible_user: root (hérite de group_vars/all)
        haos:
          hosts:
            home_assistant:
              ansible_host: 10.0.0.95

        # ── Équipements réseau ───────────────────────────────────────────────
        # Firmware propriétaire — géré via modules spécifiques, pas de hardening Linux
        network:
          hosts:
            asuswrt_merlin:
              ansible_host: 10.0.0.1
            zyxel_xgs1250:
              ansible_host: 10.0.0.75

        # ── iLO HP ──────────────────────────────────────────────────────────
        # Interface de management serveur — pas de SSH OS standard
        ilo:
          hosts:
            ilo_flash:
              ansible_host: 10.0.0.45
            ilo_hades:
              ansible_host: 192.168.1.117
