---
all:
  children:
    homelab:
      children:

        # --- Proxmox ---
        proxmox:
          children:
            proxmox_hypervisors:
              hosts:
                proxmox_flash:
                  ansible_host: 10.0.0.81
                proxmox_wasp:
                  ansible_host: 10.0.0.82
            proxmox_pbs:
              hosts:
                pbs:
                  ansible_host: 10.0.0.80

        # --- TrueNAS ---
        truenas:
          hosts:
            truenas_hermes:
              ansible_host: 10.100.0.10        # VM
            truenas_hades:
              ansible_host: 192.168.1.119       # Bare metal, réseau séparé

        # --- K3S ---
        k3s_masters:
          hosts:
            k3s_master:
              ansible_host: 10.100.0.151        # VM

        k3s_workers:
          hosts:
            k3s_worker:
              ansible_host: 10.100.0.152        # VM

        # --- VMs applicatives ---
        vms:
          hosts:
            home_assistant:
              ansible_host: 10.0.0.95

        # --- LXC ---
        lxc:
          hosts:
            traefik:
              ansible_host: 10.0.0.85             # LXC passerelle 10.0.0.x ↔ 10.100.0.x (aussi 10.100.0.1)
            unbound:
              ansible_host: 10.0.0.87
            adguard:
              ansible_host: 10.0.0.86
            semaphore:
              ansible_host: 10.100.0.106
            gitea:
              ansible_host: 10.100.0.107
            webhook:
              ansible_host: 10.100.0.103
            ollama:
              ansible_host: 10.100.0.104
            qbittorrent:
              ansible_host: 10.100.0.105
            seedbox:
              ansible_host: 10.100.0.201
            jellyfin:
              ansible_host: 10.100.0.202
            tailscale_hades:
              ansible_host: 10.100.0.220        # LXC Tailscale — proxy vers réseau 192.168.1.x

        # --- VPS ---
        vps:
          hosts:
            debian_vps:
              ansible_host: x.x.x.x             # À remplacer

        # --- Réseau ---
        network:
          hosts:
            asuswrt_merlin:
              ansible_host: 10.0.0.1
            zyxel_xgs1250:
              ansible_host: 10.0.0.75

        # --- iLO (management uniquement, pas SSH OS) ---
        ilo:
          hosts:
            ilo_flash:
              ansible_host: 10.0.0.45
            ilo_hades:
              ansible_host: 192.168.1.117
