---
# Semaphore UI Ansible — LXC 1101 (10.100.0.101) sur Wasp

# Renseigner la version souhaitée avant déploiement
# Chercher sur https://github.com/semaphoreui/semaphore/releases
semaphore_version: "2.18.2"
semaphore_download_url: "https://github.com/semaphoreui/semaphore/releases/download/v{{ semaphore_version }}/semaphore_{{ semaphore_version }}_linux_amd64.tar.gz"

semaphore_port: 3000
semaphore_domain: "semaphore.wiserisk.home"
semaphore_public_domain: "semaphore.wiserisk.be"

semaphore_admin_user: "admin"
semaphore_admin_email: "{{ vault_admin_email }}"

hardening_ufw_rules:
  - port: "3000"
    proto: tcp
    rule: allow

# ── LLDAP ─────────────────────────────────────────────────────────────────────
semaphore_lldap_host: lldap.vps.wiserisk.be
semaphore_lldap_port: 389