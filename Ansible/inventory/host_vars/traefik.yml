---
# IP côté réseau de gestion (10.0.0.x)
ansible_host: 10.0.0.85
# IP côté réseau services (10.100.0.x) — interface de passerelle
traefik_internal_ip: 10.100.0.1

# Passerelle DMZ — hardening level 3 (exposé internet via VPS)
hardening_level: 3

# ── Traefik ────────────────────────────────────────────────────────────────
traefik_acme_email: "{{ vault_admin_email }}"
traefik_download_url: "https://github.com/traefik/traefik/releases/download/v3.7.1/traefik_v3.7.1_linux_amd64.tar.gz"

hardening_ufw_rules:
  - port: "80"
    proto: tcp
    rule: allow
  - port: "443"
    proto: tcp
    rule: allow