---
proxmox_pve_node: wasp
proxmox_api_token_secret: "{{ vault_proxmox_wasp_api_token_secret }}"

# Réseau — adapter proxmox_phys_iface au nom réel : `ip link` ou `lshw -class network`
proxmox_phys_ifaces:
  - enp1s0
proxmox_vmbr0_addr: 10.0.0.82/24
proxmox_vmbr0_gw: 10.0.0.1
proxmox_vmbr1_addr: 10.100.0.254/24  # IP optionnelle du host sur le bridge interne
proxmox_vmbr1_vlan: 100

proxmox_storages:
  - name: local-zfs
    type: zfspool
    pool: rpool/data
    content: [images, rootdir]
    nodes: [wasp]
    sparse: true

  - name: Plex
    type: nfs
    server: 10.100.0.10
    export: /mnt/Hermes/Data/Media/Videos
    path: /mnt/pve/Plex
    content: [snippets]

  - name: SeedBox
    type: nfs
    server: 10.100.0.10
    export: /mnt/Hermes/Data/Media
    path: /mnt/pve/SeedBox
    content: [snippets]

  - name: Git
    type: nfs
    server: 10.100.0.10
    export: /mnt/Hermes/Git
    path: /mnt/pve/Git
    content: [snippets]

  - name: Backups
    type: pbs
    server: 10.0.0.80
    datastore: pve
    username: "root@pam"
    password: "{{ vault_pbs_root_password }}"
    fingerprint: "{{ vault_pbs_fingerprint }}"
    content: [backup]

# Schéma VMID : vmbr1 → 1XXX, vmbr0 → 9XXX (XXX = last octet zero-padded)
# Dual-homed → règle vmbr1

proxmox_lxc:
  - vmid: 9180                                              # 9 + 087 (10.0.0.180)
    backup: none                                            # Config gérée par Ansible, recréable
    hostname: unbound-wasp
    description: "Unbound DNS"
    cores: 1
    memory: 256
    disk: 2
    unprivileged: true
    netif:
      net0: "name=eth0,bridge=vmbr0,ip=10.0.0.180/24,gw=10.0.0.1"

  - vmid: 9181                                              # 9 + 086 (10.0.0.181)
    backup: none                                            # Config gérée par Ansible, recréable
    hostname: adguard-wasp
    description: "AdGuard Home — DNS"
    cores: 1
    memory: 1024
    swap: 2048
    disk: 8
    unprivileged: true
    features:
      - nesting=1
    startup: "order=1"
    netif:
      net0: "name=eth0,bridge=vmbr0,ip=10.0.0.181/24,gw=10.0.0.1"

  - vmid: 1001                                              # 1 + 001 (10.100.0.1)
    backup: none                                            # Config dans Ansible, recréable
    hostname: traefik
    description: "Reverse proxy — passerelle vmbr0 <-> vmbr1"
    cores: 1
    memory: 1024
    swap: 2048
    disk: 16
    unprivileged: true
    features:
      - nesting=1
    startup: "order=2"
    netif:
      net0: "name=eth0,bridge=vmbr0,ip=10.0.0.182/24,gw=10.0.0.1"
      net1: "name=eth1,bridge=vmbr1,ip=10.100.0.1/24"

  - vmid: 1100                                              # 1 + 100 (10.100.0.100)
    backup: none                                            # Données (repos + DB) sur NFS, TrueNAS/ZFS les protège
    hostname: gitea
    description: "Gitea — Git server"
    cores: 2
    memory: 1024
    disk: 8
    unprivileged: true
    mounts:
      mp0: "/mnt/pve/Git,mp=/opt/gitea,shared=1"
    netif:
      net0: "name=eth0,bridge=vmbr1,ip=10.100.0.100/24,gw=10.100.0.1"

  - vmid: 1101                                              # 1 + 101 (10.100.0.101)
    backup: non_critical
    hostname: semaphore
    description: "Semaphore — UI Ansible"
    cores: 2
    memory: 1024
    disk: 8
    unprivileged: true
    netif:
      net0: "name=eth0,bridge=vmbr1,ip=10.100.0.101/24,gw=10.100.0.1"

  - vmid: 1102                                              # 1 + 102 (10.100.0.102)
    backup: non_critical
    hostname: gatus
    description: "Gatus — monitoring uptime interne"
    cores: 1
    memory: 1024
    disk: 4
    unprivileged: true
    netif:
      net0: "name=eth0,bridge=vmbr1,ip=10.100.0.102/24,gw=10.100.0.1"

proxmox_vms: []