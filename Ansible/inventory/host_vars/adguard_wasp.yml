---
# AdGuard Home — LXC 9086 (10.0.0.86) sur Wasp
# Architecture : AdGuard → Unbound (10.0.0.87) → root hints

adguard_port: 80
adguard_upstream_dns: "10.0.0.87"  # unbound_wasp

adguard_dns_rewrites:
  - domain: "*.wiserisk.home"
    answer: "10.0.0.84"            # traefik_wasp

hardening_ufw_rules:
  - port: "80"
    proto: tcp
    rule: allow
  - port: "53"
    proto: udp
    rule: allow
  - port: "53"
    proto: tcp
    rule: allow