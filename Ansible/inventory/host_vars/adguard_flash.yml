---
# AdGuard Home — LXC 9191 (10.0.0.191) sur Flash
# Architecture : AdGuard → Unbound (10.0.0.190) → root hints

adguard_version: "0.107.74"
adguard_port: 80
adguard_upstream_dns: "10.0.0.190"  # unbound_flash

adguard_dns_rewrites:
  - domain: "*.wiserisk.home"
    answer: "10.0.0.192"            # traefik_flash

adguard_blocking_lists:
  - name: "Hagezi Pro+"
    url: "https://cdn.jsdelivr.net/gh/hagezi/dns-blocklists@latest/adblock/pro.plus.txt"
  - name: "OISD Full"
    url: "https://big.oisd.nl/"

hardening_ufw_rules:
  - port: "80"
    proto: tcp
    rule: allow
  - port: "53"
    proto: udp
    rule: allow
  - port: "53"
    proto: tcp
    rule: allow
