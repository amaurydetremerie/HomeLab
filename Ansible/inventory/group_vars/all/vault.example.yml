---
# Fichier de référence — liste complète des secrets à définir dans le vault Ansible
#
# Créer le vault chiffré :
#   ansible-vault create inventory/group_vars/all/vault.yml
#
# Modifier le vault :
#   ansible-vault edit inventory/group_vars/all/vault.yml
#
# Lancer un playbook avec le vault :
#   ansible-playbook playbooks/site.yml --ask-vault-pass
#   ansible-playbook playbooks/site.yml --vault-password-file ~/.vault_pass

# ── Global ────────────────────────────────────────────────────────────────
# Adresse mail admin — utilisée pour les alertes backup, ACME Let's Encrypt, SMTP Gitea/Semaphore
vault_admin_email: ""

# ── Proxmox ───────────────────────────────────────────────────────────────
# Généré par proxmox_bootstrap.yml (pveum user token add ansible@pam ansible)
# Hosts distincts, tokens distincts
vault_proxmox_flash_api_token_secret: ""
vault_proxmox_wasp_api_token_secret: ""

# ── TrueNAS ───────────────────────────────────────────────────────────────
# Généré lors de l'installation TrueNAS : UI → Credentials → API Keys
vault_truenas_hermes_api_key: ""
vault_truenas_hades_api_key: ""

# Mot de passe du compte SMB (défini librement)
vault_truenas_hermes_smb_password: ""

# ── PBS ───────────────────────────────────────────────────────────────────
# Token API PBS — généré par proxmox_pbs.yml (proxmox-backup-manager user token create ansible@pbs ansible)
vault_pbs_api_token_secret: ""

# Fingerprint TLS du serveur PBS — extrait automatiquement par proxmox_pbs.yml
# Commande manuelle : openssl x509 -fingerprint -sha256 -noout -in /etc/proxmox-backup/proxy.pem
vault_pbs_fingerprint: ""

# ── LXC ───────────────────────────────────────────────────────────────────
# Mot de passe root des LXC pour accès console d'urgence (Proxmox UI)
vault_root_password: ""

# ── Utilisateurs Linux ─────────────────────────────────────────────────────
# Mot de passe commun pour l'utilisateur wiserisk sur LXC/VMs/VPS/Pi
# Utilisé pour sudo (le user ansible a NOPASSWD sudo — pas de mot de passe requis)
vault_linux_user_password: ""

# ── iLO HP ────────────────────────────────────────────────────────────────
# Mot de passe du compte Administrator iLO (sur l'étiquette du serveur ou changé via UI)
vault_ilo_flash_password: ""
vault_ilo_hades_password: ""

# ── AdGuard ───────────────────────────────────────────────────────────────────
vault_adguard_user: ""
vault_adguard_password: ""

# ── Gatus ─────────────────────────────────────────────────────────────────────
# Webhook Discord : Paramètres serveur → Intégrations → Webhooks → Nouveau webhook
vault_gatus_discord_webhook: ""

# ── Tailscale ─────────────────────────────────────────────────────────────────
# Clé réutilisable : https://login.tailscale.com/admin/settings/keys
vault_tailscale_auth_key: ""

# ── Traefik ───────────────────────────────────────────────────────────────────
vault_traefik_my_auth: ""           # Format : user:realm:ha1 (digest auth)
vault_traefik_basic_auth: ""        # Format : user:$2y$hash (bcrypt)
vault_traefik_vault_token: ""       # Token Vault pour sync-ollama-bearer
vault_traefik_vault_addr: ""        # Ex : https://vault.k3s.wiserisk.be/v1/k3s/data

# ── Gitea ─────────────────────────────────────────────────────────────────────
vault_gitea_smtp_password: ""
vault_gitea_secret_key: ""          # openssl rand -hex 32
vault_gitea_internal_token: ""      # openssl rand -hex 32

# ── Semaphore ─────────────────────────────────────────────────────────────────
vault_semaphore_cookie_hash: ""           # openssl rand -hex 32
vault_semaphore_cookie_encryption: ""     # openssl rand -hex 32
vault_semaphore_access_key_encryption: "" # openssl rand -hex 32
vault_semaphore_admin_password: ""

# ── WireGuard ─────────────────────────────────────────────────────────────────
# Clés privées — une par host WireGuard (wg genkey)
# Convention : vault_wireguard_<hostname>_private_key
# Référencer dans host_vars/<host>.yml : wireguard_private_key: "{{ vault_wireguard_<hostname>_private_key }}"
vault_wireguard_vps_private_key: ""       # wg genkey
# vault_wireguard_flash_private_key: ""
# vault_wireguard_wasp_private_key: ""

# Clés publiques des peers (wg pubkey < clé_privée)
# Convention : vault_wg_<hostname>_pubkey
vault_wg_vps_pubkey: ""
# vault_wg_flash_pubkey: ""
# vault_wg_wasp_pubkey: ""
# vault_wg_laptop_pubkey: ""