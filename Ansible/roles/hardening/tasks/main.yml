---
- name: Vérifier que les clés SSH sont renseignées
  ansible.builtin.assert:
    that:
      - wiserisk_ssh_public_key | length > 0
      - ansible_operator_ssh_public_key | length > 0
    fail_msg: >
      Les clés SSH sont vides. Remplir wiserisk_ssh_public_key et
      ansible_operator_ssh_public_key dans inventory/group_vars/all/vars.yml
      avant de lancer le hardening.

- import_tasks: users.yml
- import_tasks: ssh.yml
- import_tasks: packages.yml
- import_tasks: ufw.yml
  when: hardening_level | int >= 2
- import_tasks: fail2ban_strict.yml
  when: hardening_level | int >= 3