---
# Gitea — LXC 1100 (10.100.0.100) sur Wasp
# Toutes les données sur NFS Git : /mnt/pve/Git → /opt/gitea (monté par Proxmox)
# Logs en local : /var/log/gitea
#
# Prérequis vault :
#   vault_gitea_smtp_password
#   vault_gitea_secret_key, vault_gitea_internal_token  (générer : openssl rand -hex 32)
#
# Config : host_vars/gitea.yml
# Template : playbooks/templates/gitea/app.ini.j2
#
# Utilisation :
#   ansible-playbook playbooks/gitea.yml

- name: Install and configure Gitea
  hosts: gitea
  gather_facts: false
  become: true
  tasks:
    - name: Install dependencies
      ansible.builtin.apt:
        name: [git, curl]
        state: present
        update_cache: true

    - name: Create git group
      ansible.builtin.group:
        name: git
        system: true

    - name: Create git user
      ansible.builtin.user:
        name: git
        group: git
        system: true
        shell: /bin/bash
        home: /opt/gitea
        create_home: false

    - name: Create data directories on NFS mount
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: git
        group: git
        mode: '0750'
      loop:
        - /opt/gitea/data
        - /opt/gitea/indexers
        - /opt/gitea/sessions
        - /opt/gitea/avatars
        - /opt/gitea/repo-avatars
        - /opt/gitea/attachments
        - /opt/gitea/repositories
        - /opt/gitea/lfs
        - /opt/gitea/.ssh

    - name: Create local log directory
      ansible.builtin.file:
        path: /var/log/gitea
        state: directory
        owner: git
        group: git
        mode: '0750'

    - name: Create config directory
      ansible.builtin.file:
        path: /etc/gitea
        state: directory
        owner: root
        group: git
        mode: '0750'

    - name: Download Gitea binary
      ansible.builtin.get_url:
        url: "{{ gitea_download_url }}"
        dest: /usr/local/bin/gitea
        owner: root
        group: root
        mode: '0755'
        force: false
      notify: Restart gitea

    - name: Deploy Gitea config
      ansible.builtin.template:
        src: templates/gitea/app.ini.j2
        dest: /etc/gitea/app.ini
        owner: root
        group: git
        mode: '0660'
      notify: Restart gitea

    - name: Deploy Gitea systemd service
      ansible.builtin.copy:
        src: files/gitea/gitea.service
        dest: /etc/systemd/system/gitea.service
        owner: root
        group: root
        mode: '0644'
      notify:
        - Reload systemd
        - Restart gitea

    - name: Enable and start Gitea
      ansible.builtin.systemd:
        name: gitea
        enabled: true
        state: started
        daemon_reload: true

    - name: Wait for Gitea API to be ready
      ansible.builtin.uri:
        url: "http://localhost:{{ gitea_port }}/api/v1/version"
        status_code: 200
      register: gitea_api_ready
      retries: 15
      delay: 3
      until: gitea_api_ready.status == 200

    - name: Create Gitea repos if not exist
      ansible.builtin.uri:
        url: "http://localhost:{{ gitea_port }}/api/v1/user/repos"
        method: POST
        url_username: "{{ gitea_admin_user }}"
        url_password: "{{ vault_gitea_admin_password }}"
        force_basic_auth: true
        body_format: json
        body:
          name: "{{ item.local_repo }}"
          private: true
          auto_init: false
        status_code: [201, 409]
      loop: "{{ gitea_github_mirrors }}"

    - name: Check LLDAP auth sources
      ansible.builtin.command:
        cmd: gitea admin auth list -c /etc/gitea/app.ini
      become_user: git
      register: gitea_auth_list
      changed_when: false

    - name: Add LLDAP auth source
      ansible.builtin.command:
        argv:
          - gitea
          - admin
          - auth
          - add-ldap
          - --name
          - lldap
          - --host
          - "{{ gitea_lldap_host }}"
          - --port
          - "{{ gitea_lldap_port }}"
          - --security-protocol
          - unencrypted
          - --bind-dn
          - "uid=admin,ou=people,dc=wiserisk,dc=be"
          - --bind-password
          - "{{ vault_lldap_admin_password }}"
          - --user-search-base
          - "ou=people,dc=wiserisk,dc=be"
          - --user-filter
          - "(&(objectClass=person)(uid=%s))"
          - --username-attribute
          - uid
          - --firstname-attribute
          - givenName
          - --surname-attribute
          - sn
          - --email-attribute
          - mail
          - --synchronize-users
          - -c
          - /etc/gitea/app.ini
      become_user: git
      when: "'lldap' not in gitea_auth_list.stdout"
      no_log: true

    - name: Get existing push mirrors
      ansible.builtin.uri:
        url: "http://localhost:{{ gitea_port }}/api/v1/repos/{{ gitea_admin_user }}/{{ item.local_repo }}/push_mirrors"
        url_username: "{{ gitea_admin_user }}"
        url_password: "{{ vault_gitea_admin_password }}"
        force_basic_auth: true
        status_code: 200
      register: gitea_push_mirrors
      loop: "{{ gitea_github_mirrors }}"

    - name: Configure GitHub push mirrors
      ansible.builtin.uri:
        url: "http://localhost:{{ gitea_port }}/api/v1/repos/{{ gitea_admin_user }}/{{ item.item.local_repo }}/push_mirrors"
        method: POST
        url_username: "{{ gitea_admin_user }}"
        url_password: "{{ vault_gitea_admin_password }}"
        force_basic_auth: true
        body_format: json
        body:
          remote_name: github
          remote_address: "https://github.com/{{ item.item.github_repo }}.git"
          remote_username: "{{ item.item.github_repo.split('/')[0] }}"
          remote_password: "{{ vault_github_pat }}"
          sync_on_commit: true
          interval: "8h0m0s"
        status_code: [200, 201]
      when: item.json | selectattr('remote_name', 'equalto', 'github') | list | length == 0
      loop: "{{ gitea_push_mirrors.results }}"
      no_log: true

    - name: Add wiserisk SSH public key to Gitea
      ansible.builtin.uri:
        url: "http://localhost:{{ gitea_port }}/api/v1/user/keys"
        method: POST
        url_username: "{{ gitea_admin_user }}"
        url_password: "{{ vault_gitea_admin_password }}"
        force_basic_auth: true
        body_format: json
        body:
          key: "{{ wiserisk_ssh_public_key }}"
          read_only: false
          title: "ansible-managed"
      register: add_key_result
      failed_when: add_key_result.status not in [201, 422]
      changed_when: add_key_result.status == 201

  handlers:
    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Restart gitea
      ansible.builtin.systemd:
        name: gitea
        state: restarted