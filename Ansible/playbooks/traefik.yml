---
# Déploiement Traefik — LXC traefik (10.0.0.85 / 10.100.0.1)
# Configs source : Traefik/ à la racine du repo → /etc/Homelab/Traefik/ sur le LXC
#
# Prérequis vault :
#   vault_traefik_my_auth, vault_traefik_basic_auth
#   vault_traefik_vault_addr, vault_traefik_vault_token (pour sync-ollama-bearer)
#
# Config : host_vars/traefik.yml
# Templates : playbooks/templates/traefik/
#
# Utilisation :
#   ansible-playbook playbooks/traefik.yml
#   ansible-playbook playbooks/traefik.yml --tags config    # configs uniquement, sans toucher au binaire

- name: Deploy Traefik
  hosts: "{{ target | default('traefik') }}"
  gather_facts: false
  become: true
  vars:
    traefik_src:        "{{ playbook_dir }}/../Traefik"
    traefik_config_dir: /etc/Homelab/Traefik
    traefik_acme_dir:   /etc/traefik
    traefik_log_dir:    /var/log/traefik
  tasks:
    # ── Utilisateur et répertoires ───────────────────────────────────────────
    - name: Create traefik group
      ansible.builtin.group:
        name: traefik
        system: true

    - name: Create traefik user
      ansible.builtin.user:
        name: traefik
        group: traefik
        system: true
        shell: /usr/sbin/nologin
        home: /var/lib/traefik
        create_home: false

    - name: Create directories
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: directory
        owner: "{{ item.owner | default('traefik') }}"
        group: traefik
        mode: "{{ item.mode | default('0750') }}"
      loop:
        - { path: "{{ traefik_acme_dir }}" }
        - { path: "{{ traefik_acme_dir }}/plugins-storage" }
        - { path: "{{ traefik_log_dir }}" }
        - { path: "{{ traefik_config_dir }}" }
        - { path: "{{ traefik_config_dir }}/traefik_dynamic" }
        - { path: "{{ traefik_config_dir }}/scripts", owner: root }

    - name: Create acme.json (permissions strictes)
      ansible.builtin.file:
        path: "{{ traefik_acme_dir }}/acme.json"
        state: touch
        owner: traefik
        group: traefik
        mode: '0600'
        modification_time: preserve
        access_time: preserve

    # ── Binaire (conditionnel) ───────────────────────────────────────────────
    - name: Download Traefik binary
      ansible.builtin.get_url:
        url: "{{ traefik_download_url }}"
        dest: /tmp/traefik.tar.gz
        checksum: "{{ traefik_checksum | default(omit) }}"
      when: traefik_download_url is defined
      tags: binary
      notify: Restart traefik

    - name: Extract Traefik binary
      ansible.builtin.unarchive:
        src: /tmp/traefik.tar.gz
        dest: /usr/local/bin/
        remote_src: true
        include: [traefik]
        owner: root
        group: traefik
        mode: '0750'
      when: traefik_download_url is defined
      tags: binary
      notify: Restart traefik

    # ── Configs ──────────────────────────────────────────────────────────────
    - name: Deploy traefik.toml
      ansible.builtin.copy:
        src: "{{ traefik_src }}/traefik.toml"
        dest: "{{ traefik_config_dir }}/traefik.toml"
        owner: traefik
        group: traefik
        mode: '0640'
      tags: config
      notify: Restart traefik

    - name: Deploy dynamic configs
      ansible.builtin.copy:
        src: "{{ traefik_src }}/traefik_dynamic/"
        dest: "{{ traefik_config_dir }}/traefik_dynamic/"
        owner: traefik
        group: traefik
        mode: '0640'
      tags: config
      notify: Restart traefik

    - name: Deploy scripts
      ansible.builtin.copy:
        src: "{{ traefik_src }}/scripts/"
        dest: "{{ traefik_config_dir }}/scripts/"
        owner: root
        group: traefik
        mode: '0750'
      tags: config

    # ── Systemd units ────────────────────────────────────────────────────────
    - name: Deploy traefik.service
      ansible.builtin.copy:
        src: "{{ traefik_src }}/traefik.service"
        dest: /etc/systemd/system/traefik.service
        owner: root
        group: root
        mode: '0644'
      notify:
        - Reload systemd
        - Restart traefik

    - name: Deploy sync-ollama-bearer.service
      ansible.builtin.copy:
        src: "{{ traefik_src }}/sync-ollama-bearer.service"
        dest: /etc/systemd/system/sync-ollama-bearer.service
        owner: root
        group: root
        mode: '0644'
      notify: Reload systemd

    - name: Deploy sync-ollama-bearer.timer
      ansible.builtin.copy:
        src: "{{ traefik_src }}/sync-ollama-bearer.timer"
        dest: /etc/systemd/system/sync-ollama-bearer.timer
        owner: root
        group: root
        mode: '0644'
      notify: Reload systemd

    # ── Overrides (secrets) ──────────────────────────────────────────────────
    - name: Create traefik override directory
      ansible.builtin.file:
        path: /etc/systemd/system/traefik.service.d
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Deploy traefik service override
      ansible.builtin.template:
        src: templates/traefik/service_override.conf.j2
        dest: /etc/systemd/system/traefik.service.d/override.conf
        owner: root
        group: root
        mode: '0600'
      notify:
        - Reload systemd
        - Restart traefik

    - name: Create sync-ollama-bearer override directory
      ansible.builtin.file:
        path: /etc/systemd/system/sync-ollama-bearer.service.d
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Deploy sync-ollama-bearer service override
      ansible.builtin.template:
        src: templates/traefik/sync_ollama_override.conf.j2
        dest: /etc/systemd/system/sync-ollama-bearer.service.d/override.conf
        owner: root
        group: root
        mode: '0600'
      notify: Reload systemd

    # ── Démarrage ────────────────────────────────────────────────────────────
    - name: Enable and start Traefik
      ansible.builtin.systemd:
        name: traefik
        enabled: true
        state: started
        daemon_reload: true

    - name: Enable and start sync-ollama-bearer timer
      ansible.builtin.systemd:
        name: sync-ollama-bearer.timer
        enabled: true
        state: started
        daemon_reload: true

  handlers:
    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Restart traefik
      ansible.builtin.systemd:
        name: traefik
        state: restarted