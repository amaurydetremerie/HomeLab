server:
  verbosity: 1
  interface: 0.0.0.0
  port: 53
  do-ip4: yes
  do-ip6: no
  do-udp: yes
  do-tcp: yes

  access-control: 127.0.0.0/8 allow
  access-control: 10.0.0.0/8 allow
  access-control: 0.0.0.0/0 refuse

  hide-identity: yes
  hide-version: yes
  harden-glue: yes
  harden-dnssec-stripped: yes
  use-caps-for-id: yes

  prefetch: yes
  prefetch-key: yes
  num-threads: 1
  msg-cache-size: 32m
  rrset-cache-size: 64m
  cache-min-ttl: 300
  cache-max-ttl: 86400

  auto-trust-anchor-file: /var/lib/unbound/root.key

  logfile: ""
  log-queries: no
  log-replies: no