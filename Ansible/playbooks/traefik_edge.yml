---
# Déploiement Traefik Edge (VPS) — terminaison TLS OVH wildcard, routage vers traefik_wasp via WireGuard
#
# Prérequis vault :
#   vault_admin_email
#   vault_ovh_application_key, vault_ovh_application_secret, vault_ovh_consumer_key
#   vault_traefik_my_auth, vault_traefik_basic_auth
#
# Prérequis infrastructure :
#   - WireGuard VPS en écoute sur 127.0.0.1:51821 (wireguard_port: 51821 dans debian_vps.yml)
#   - AdGuard DNS en écoute sur 127.0.0.1:5353 (adguard_dns_port: 5353 dans debian_vps.yml)
#   - traefik_wasp configuré pour servir en HTTP uniquement (sans TLS ni redirect-to-https)
#
# Config : host_vars/debian_vps.yml
# Templates : playbooks/templates/traefik_edge/
#
# Utilisation :
#   ansible-playbook playbooks/traefik_edge.yml
#   ansible-playbook playbooks/traefik_edge.yml --tags config    # configs uniquement

- name: Deploy Traefik Edge (VPS)
  hosts: "{{ target | default('debian_vps') }}"
  gather_facts: false
  become: true
  vars:
    traefik_src:        "{{ playbook_dir }}/../../Traefik-Edge"
    traefik_config_dir: /etc/Homelab/Traefik-Edge
    traefik_acme_dir:   /etc/traefik
    traefik_log_dir:    /var/log/traefik
  tasks:
    # ── Utilisateur et répertoires ───────────────────────────────────────────
    - name: Create traefik group
      ansible.builtin.group:
        name: traefik
        system: true

    - name: Create traefik user
      ansible.builtin.user:
        name: traefik
        group: traefik
        system: true
        shell: /usr/sbin/nologin
        home: /var/lib/traefik
        create_home: false

    - name: Create directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: traefik
        group: traefik
        mode: '0750'
      loop:
        - "{{ traefik_acme_dir }}"
        - "{{ traefik_acme_dir }}/plugins-storage"
        - "{{ traefik_log_dir }}"
        - "{{ traefik_config_dir }}"
        - "{{ traefik_config_dir }}/traefik_dynamic"

    - name: Create acme.json
      ansible.builtin.file:
        path: "{{ traefik_acme_dir }}/acme.json"
        state: touch
        owner: traefik
        group: traefik
        mode: '0600'
        modification_time: preserve
        access_time: preserve

    # ── Binaire (conditionnel) ───────────────────────────────────────────────
    - name: Download Traefik binary
      ansible.builtin.get_url:
        url: "{{ traefik_download_url }}"
        dest: /tmp/traefik.tar.gz
        checksum: "{{ traefik_checksum | default(omit) }}"
      when: traefik_download_url is defined
      tags: binary
      notify: Restart traefik

    - name: Extract Traefik binary
      ansible.builtin.unarchive:
        src: /tmp/traefik.tar.gz
        dest: /usr/local/bin/
        remote_src: true
        include: [traefik]
        owner: root
        group: traefik
        mode: '0750'
      when: traefik_download_url is defined
      tags: binary
      notify: Restart traefik

    # ── Configs ──────────────────────────────────────────────────────────────
    - name: Deploy traefik.yaml
      ansible.builtin.copy:
        src: "{{ traefik_src }}/traefik.yaml"
        dest: "{{ traefik_config_dir }}/traefik.yaml"
        owner: traefik
        group: traefik
        mode: '0640'
      tags: config
      notify: Restart traefik

    - name: Deploy dynamic configs
      ansible.builtin.copy:
        src: "{{ traefik_src }}/traefik_dynamic/"
        dest: "{{ traefik_config_dir }}/traefik_dynamic/"
        owner: traefik
        group: traefik
        mode: '0640'
      tags: config
      notify: Restart traefik

    # ── Systemd unit ─────────────────────────────────────────────────────────
    - name: Deploy traefik.service
      ansible.builtin.copy:
        src: "{{ traefik_src }}/traefik.service"
        dest: /etc/systemd/system/traefik.service
        owner: root
        group: root
        mode: '0644'
      notify:
        - Reload systemd
        - Restart traefik

    - name: Create traefik override directory
      ansible.builtin.file:
        path: /etc/systemd/system/traefik.service.d
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Deploy traefik service override (secrets OVH)
      ansible.builtin.template:
        src: templates/traefik_edge/service_override.conf.j2
        dest: /etc/systemd/system/traefik.service.d/override.conf
        owner: root
        group: root
        mode: '0600'
      notify:
        - Reload systemd
        - Restart traefik

    # ── Démarrage ────────────────────────────────────────────────────────────
    - name: Enable and start Traefik Edge
      ansible.builtin.systemd:
        name: traefik
        enabled: true
        state: started
        daemon_reload: true

  handlers:
    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Restart traefik
      ansible.builtin.systemd:
        name: traefik
        state: restarted