---
# Configuration des storages Proxmox — à lancer après proxmox_pbs.yml
# Premier passage (avant PBS) : NFS + ZFS créés, PBS skippé si fingerprint absent
# Second passage (après PBS)  : PBS ajouté, autres idempotents
#
# ansible-playbook playbooks/proxmox_storage.yml
# ansible-playbook playbooks/proxmox_storage.yml --limit proxmox_flash

- name: Configure Proxmox storages
  hosts: "{{ target | default('proxmox_hypervisors') }}"
  gather_facts: false
  connection: local
  pre_tasks:
    - name: Recharger le vault (fingerprint PBS potentiellement ajouté)
      ansible.builtin.include_vars:
        file: "{{ inventory_dir }}/group_vars/all/vault.yml"
      failed_when: false
  tasks:
    - name: Configure storage {{ item.name }} ({{ item.type }})
      community.proxmox.proxmox_storage:
        api_host: "{{ ansible_host }}"
        api_user: "ansible@pam"
        api_token_id: "ansible"
        api_token_secret: "{{ proxmox_api_token_secret }}"
        name: "{{ item.name }}"
        type: "{{ item.type }}"
        content: "{{ item.content }}"
        nodes: "{{ item.nodes | default([proxmox_pve_node]) }}"
        nfs_options: >-
          {{ {'server': item.server, 'export': item.export}
             if item.type == 'nfs' else omit }}
        pbs_options: >-
          {{ {'server': item.server, 'username': item.username,
              'password': item.password, 'datastore': item.datastore,
              'fingerprint': item.fingerprint}
             if item.type == 'pbs' else omit }}
        zfspool_options: >-
          {{ {'pool': item.pool}
             if item.type == 'zfspool' else omit }}
        state: present
      loop: "{{ proxmox_storages }}"
      loop_control:
        label: "{{ item.name }} ({{ item.type }})"
      when: >
        item.type != 'pbs' or
        (vault_pbs_fingerprint | default('') | length > 0 and
         item.password is defined and item.password | length > 0)
      delegate_to: localhost
      become: false