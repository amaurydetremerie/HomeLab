---
# Installation et configuration WireGuard — serveur ou client
#
# wireguard_role: server   → écoute sur wireguard_port, active NAT, gère plusieurs peers
# wireguard_role: client   → se connecte à un serveur via peer.endpoint
#
# Prérequis vault :
#   wireguard_private_key: "{{ vault_wireguard_<host>_private_key }}"
#   (défini dans host_vars/<host>.yml, clé privée dans le vault)
#
# Config : host_vars/<host>.yml
# Template : playbooks/templates/wireguard/wg.conf.j2
#
# Utilisation :
#   ansible-playbook playbooks/wireguard.yml               # hosts: wireguard
#   ansible-playbook playbooks/vps.yml                     # importé avec target=vps

- name: Install and configure WireGuard
  hosts: "{{ target | default('wireguard') }}"
  gather_facts: true
  become: true
  handlers:
    - name: Restart wg-quick
      ansible.builtin.systemd:
        name: "wg-quick@{{ wireguard_interface | default('wg0') }}"
        state: restarted

  tasks:
    - name: Install wireguard
      ansible.builtin.apt:
        name:
          - wireguard
          - wireguard-tools
          - iptables
        state: present
        update_cache: true

    - name: Enable IPv4 forwarding (serveur uniquement)
      ansible.posix.sysctl:
        name: net.ipv4.ip_forward
        value: "1"
        sysctl_set: true
        state: present
        reload: true
      when: wireguard_role | default('client') == 'server'

    - name: Deploy WireGuard interface config (bootstrap uniquement — wireguard-ui gère ensuite)
      ansible.builtin.template:
        src: templates/wireguard/wg.conf.j2
        dest: "/etc/wireguard/{{ wireguard_interface | default('wg0') }}.conf"
        owner: root
        group: root
        mode: '0600'
        force: false
      notify: Restart wg-quick

    - name: Enable and start wg-quick service
      ansible.builtin.systemd:
        name: "wg-quick@{{ wireguard_interface | default('wg0') }}"
        enabled: true
        state: started
        daemon_reload: true

    - name: Deploy WireGuard watchdog script
      ansible.builtin.template:
        src: templates/wireguard/wg-watchdog.sh.j2
        dest: /usr/local/bin/wg-watchdog.sh
        owner: root
        group: root
        mode: '0750'
      when: wireguard_role | default('client') == 'client'

    - name: Deploy WireGuard watchdog service
      ansible.builtin.template:
        src: templates/wireguard/wg-watchdog.service.j2
        dest: /etc/systemd/system/wg-watchdog.service
        owner: root
        group: root
        mode: '0644'
      when: wireguard_role | default('client') == 'client'

    - name: Deploy WireGuard watchdog timer
      ansible.builtin.template:
        src: templates/wireguard/wg-watchdog.timer.j2
        dest: /etc/systemd/system/wg-watchdog.timer
        owner: root
        group: root
        mode: '0644'
      when: wireguard_role | default('client') == 'client'

    - name: Enable and start WireGuard watchdog timer
      ansible.builtin.systemd:
        name: wg-watchdog.timer
        enabled: true
        state: started
        daemon_reload: true
      when: wireguard_role | default('client') == 'client'