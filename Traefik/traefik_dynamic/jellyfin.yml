http:
  services:
    jellyfin:
      loadBalancer:
        servers:
          - url: "http://10.100.0.202:8096"

  routers:
    jellyfin:
      rule: "Host(`jellyfin.wiserisk.be`)"
      entryPoints:
        - "web"
      middlewares:
        - "security@file"
        - "compression@file"
      service: "jellyfin@file"
    jellyfin-home:
      rule: "Host(`jellyfin.wiserisk.home`)"
      entryPoints:
        - "web"
      middlewares:
        - "redirect-to-https@file"
      service: "noop@internal"
    jellyfin-local-secure:
      rule: "Host(`jellyfin.wiserisk.home`)"
      entryPoints:
        - "websecure"
      middlewares:
        - "security@file"
        - "compression@file"
      service: "jellyfin@file"
      tls: {}