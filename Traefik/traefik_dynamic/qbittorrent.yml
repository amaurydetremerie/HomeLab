http:
  services:
    qbittorrent:
      loadBalancer:
        servers:
          - url: "http://10.100.0.106:8090"

  routers:
    qbittorrent:
      rule: "Host(`qbittorrent.wiserisk.be`)"
      entryPoints:
        - "web"
      middlewares:
        - "security@file"
        - "compression@file"
      service: qbittorrent@file
    qbittorrent-home:
      rule: "Host(`qbittorrent.wiserisk.home`)"
      entryPoints:
        - "web"
      middlewares:
        - "redirect-to-https@file"
      service: noop@internal
    qbittorrent-local-secure:
      rule: "Host(`qbittorrent.wiserisk.home`)"
      entryPoints:
        - "websecure"
      middlewares:
        - "security@file"
        - "compression@file"
      service: qbittorrent@file
      tls: {}