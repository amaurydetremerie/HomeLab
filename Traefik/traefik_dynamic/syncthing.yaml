http:
  services:
    hermes-syncthing:
      loadBalancer:
        servers:
          - url: "http://10.100.0.10:20910"
    hades-syncthing:
      loadBalancer:
        servers:
          - url: "http://10.100.0.220:8081"

  routers:
    hermes-syncthing:
      rule: "Host(`hermes.syncthing.wiserisk.be`)"
      entryPoints:
        - "web"
      middlewares:
        - "security@file"
        - "compression@file"
      service: "hermes-syncthing@file"
    hermes-syncthing-home:
      rule: "Host(`hermes.syncthing.wiserisk.home`)"
      entryPoints:
        - "web"
      middlewares:
        - "redirect-to-https@file"
      service: "noop@internal"
    hermes-syncthing-secure-local:
      rule: "Host(`hermes.syncthing.wiserisk.home`)"
      entryPoints:
        - "websecure"
      middlewares:
        - "security@file"
        - "compression@file"
      service: "hermes-syncthing@file"
      tls: {}
    hades-syncthing:
      rule: "Host(`hades.syncthing.wiserisk.be`)"
      entryPoints:
        - "web"
      middlewares:
        - "security@file"
        - "compression@file"
      service: "hades-syncthing@file"
    hades-syncthing-home:
      rule: "Host(`hades.syncthing.wiserisk.home`)"
      entryPoints:
        - "web"
      middlewares:
        - "redirect-to-https@file"
      service: "noop@internal"
    hades-syncthing-secure-local:
      rule: "Host(`hades.syncthing.wiserisk.home`)"
      entryPoints:
        - "websecure"
      middlewares:
        - "security@file"
        - "compression@file"
      service: "hades-syncthing@file"
      tls: {}