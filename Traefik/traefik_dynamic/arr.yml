http:
  services:
    arr:
      loadBalancer:
        servers:
          - url: "http://10.100.0.200:8080"
    arr-be:
      loadBalancer:
        servers:
          - url: "http://10.100.0.200:8081"
    sonarr:
      loadBalancer:
        servers:
          - url: "http://10.100.0.200:8989"
    radarr:
      loadBalancer:
        servers:
          - url: "http://10.100.0.200:7878"
    prowlarr:
      loadBalancer:
        servers:
          - url: "http://10.100.0.200:9696"
    profilarr:
      loadBalancer:
        servers:
          - url: "http://10.100.0.200:6868"
    jellyseerr:
      loadBalancer:
        servers:
          - url: "http://10.100.0.200:5055"
    calibre:
      loadBalancer:
        servers:
          - url: "http://10.100.0.200:8083"
    shelfmark:
      loadBalancer:
        servers:
          - url: "http://10.100.0.200:8084"

  routers:
    # ── Homer dashboard ────────────────────────────────────────────────────────
    arr:
      rule: "Host(`arr.wiserisk.be`)"
      entryPoints:
        - "web"
      middlewares:
        - "security@file"
        - "compression@file"
      service: arr-be@file
    arr-home:
      rule: "Host(`arr.wiserisk.home`)"
      entryPoints:
        - "web"
      middlewares:
        - "redirect-to-https@file"
      service: noop@internal
    arr-local-secure:
      rule: "Host(`arr.wiserisk.home`)"
      entryPoints:
        - "websecure"
      middlewares:
        - "security@file"
        - "compression@file"
      service: arr@file
      tls: {}

    # ── Sonarr ─────────────────────────────────────────────────────────────────
