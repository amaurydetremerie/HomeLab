http:
  services:
    k3s-wildcard:
      loadBalancer:
        servers:
          - url: "http://10.100.0.151"
  routers:
    # Trafic .be reçu en plain HTTP depuis Edge (TLS terminé au VPS)
    k3s-wildcard-be:
      rule: "HostRegexp(`{subdomain:[a-zA-Z0-9-]+}.k3s.wiserisk.be`) || Host(`k3s.wiserisk.be`)"
      entryPoints:
        - "web"
      service: "k3s-wildcard@file"
      priority: 2
    k3s-wildcard-home:
      rule: "HostRegexp(`{subdomain:[a-zA-Z0-9-]+}.k3s.wiserisk.home`) || Host(`k3s.wiserisk.home`)"
      entryPoints:
        - "web"
      service: "k3s-wildcard@file"
      priority: 2

tcp:
  services:
    # TLS passthrough uniquement pour .home (K3S gère son propre TLS localement)
    k3s-secure-wildcard-tcp:
      loadBalancer:
        servers:
          - address: "10.100.0.151:443"
    k3s-management-tcp:
      loadBalancer:
        servers:
          - address: "10.100.0.151:6443"

  routers:
    k3s-secure-wildcard-tcp:
      rule: "HostSNIRegexp(`{subdomain:[a-zA-Z0-9-]+}.k3s.wiserisk.home`) || HostSNI(`k3s.wiserisk.home`)"
      entryPoints:
        - "websecure"
      service: "k3s-secure-wildcard-tcp@file"
      priority: 2
      tls:
        passthrough: true
    k3s-management-tcp:
      rule: "HostSNI(`*`)"
      entryPoints:
        - "k3s"
      service: "k3s-management-tcp@file"

udp:
  routers:
    graylog-udp:
      entrypoints:
        - graylog
      service: graylog-udp
  services:
    graylog-udp:
      loadbalancer:
        servers:
          - address: 10.100.0.151:12201
          - address: 10.100.0.152:12201