http:
  services:
    adguard-local:
      loadBalancer:
        servers:
          - url: "http://10.0.0.181:80"

  routers:
    adguard:
      rule: "Host(`adguard.wiserisk.be`)"
      entryPoints:
        - "web"
      middlewares:
        - "security@file"
        - "compression@file"
      service: "adguard-local@file"
    adguard-local:
      rule: "Host(`adguard.wiserisk.home`)"
      entryPoints:
        - "web"
      middlewares:
        - "redirect-to-https@file"
      service: "noop@internal"
    adguard-local-secure:
      rule: "Host(`adguard.wiserisk.home`)"
      entryPoints:
        - "websecure"
      middlewares:
        - "security@file"
        - "compression@file"
      service: "adguard-local@file"
      tls: {}