apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: prowlarr-http
  namespace: prowlarr
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
spec:
  rules:
    - host: prowlarr.k3s.wiserisk.be
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: prowlarr-svc
                port:
                  number: 9696