apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: open-webui
  name: open-webui
  namespace: open-webui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: open-webui
  template:
    metadata:
      labels:
        app: open-webui
    spec:
      dnsPolicy: "None"
      dnsConfig:
        nameservers:
          - 10.0.0.86
      containers:
        - name: open-webui
          image: ghcr.io/open-webui/open-webui:0.8.12
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: open-webui-volume
              mountPath: /app/backend/data
              subPath: open-webui
          env:
            - name: OLLAMA_BASE_URL
              value: https://ollama.wiserisk.home
            - name: AIOHTTP_CLIENT_SESSION_SSL
              value: 'false'
      volumes:
        - name: open-webui-volume
          persistentVolumeClaim:
            claimName: open-webui-pvc