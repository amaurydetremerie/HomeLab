apiVersion: v1
kind: PersistentVolume
metadata:
  name: open-webui-pv
spec:
  capacity:
    storage: 50Gi
  accessModes:
    - ReadWriteMany
  storageClassName: nfs
  nfs:
    server: 10.100.0.10
    path: /mnt/Hermes/K3S/
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: open-terminal-pv
spec:
  capacity:
    storage: 50Gi
  accessModes:
    - ReadWriteMany
  storageClassName: nfs
  nfs:
    server: 10.100.0.10
    path: /mnt/Hermes/K3S/