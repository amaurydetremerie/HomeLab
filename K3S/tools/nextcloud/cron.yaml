apiVersion: batch/v1
kind: CronJob
metadata:
  name: nextcloud-cron
spec:
  schedule: "0 6 * * *"  # Toutes les jours à 6 heure
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: nextcloud-cron
              image: nextcloud:30.0.5-apache
              command:
                - /bin/sh
                - -c
                - php -f /var/www/html/cron.php
              volumeMounts:
                - name: nextcloud-volume
                  mountPath: /var/www/html
                  subPath: nextcloud
          volumes:
            - name: nextcloud-volume
              persistentVolumeClaim:
                claimName: nextcloud-pvc
          restartPolicy: OnFailure