apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gitea-runner-helm
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "7"
spec:
  project: default
  source:
    repoURL: https://git.wiserisk.be/wiserisk/HomeLab.git
    targetRevision: HEAD
    path: K3S/utils/gitea-runner/Helm
  destination:
    server: https://kubernetes.default.svc
    namespace: gitea-runner
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true