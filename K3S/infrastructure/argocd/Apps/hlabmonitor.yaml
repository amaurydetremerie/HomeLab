apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hlabmonitor
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "15"
spec:
  project: default
  source:
    repoURL: https://git.wiserisk.be/wiserisk/HomeLab.git
    targetRevision: HEAD
    path: K3S/monitoring/HLabMonitor
    plugin:
      name: argocd-vault-plugin
      env:
        - name: AVP_TYPE
          value: vault
        - name: AVP_AUTH_TYPE
          value: k8s
        - name: AVP_K8S_ROLE
          value: argocd
        - name: VAULT_ADDR
          value: http://vault-svc.secure.svc.cluster.local:8200
  destination:
    server: https://kubernetes.default.svc
    namespace: hlabmonitor
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true