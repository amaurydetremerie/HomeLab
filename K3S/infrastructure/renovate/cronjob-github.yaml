apiVersion: batch/v1
kind: CronJob
metadata:
  name: renovate-github
  namespace: renovate
spec:
  schedule: "0 */6 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: renovate
              image: ghcr.io/renovatebot/renovate:39
              imagePullPolicy: IfNotPresent
              env:
                - name: RENOVATE_CONFIG_FILE
                  value: /opt/renovate/config.js
                - name: LOG_LEVEL
                  value: info
              volumeMounts:
                - name: config
                  mountPath: /opt/renovate
              resources:
                requests:
                  memory: "256Mi"
                  cpu: "100m"
                limits:
                  memory: "512Mi"
                  cpu: "500m"
          volumes:
            - name: config
              configMap:
                name: renovate-config-github