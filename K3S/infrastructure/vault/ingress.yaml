apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vault-http
  namespace: secure
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
    - host: vault.k3s.wiserisk.be
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vault-svc
                port:
                  number: 8200
    - host: vault.k3s.wiserisk.home
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vault-svc
                port:
                  number: 8200