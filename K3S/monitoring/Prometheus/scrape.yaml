apiVersion: v1
kind: Secret
metadata:
  name: additional-scrape-configs
  namespace: monitoring
type: Opaque
stringData:
  prometheus-additional.yaml: |
    - job_name: 'jellyfin'
      metrics_path: /metrics
      scheme: https
      static_configs:
        - targets:
          - jellyfin.wiserisk.be
    - job_name: 'blackbox-https'
      metrics_path: /probe
      params:
        module: [http_2xx]
      static_configs:
        - targets:
          - https://ha.wiserisk.be
          - https://jellyfin.wiserisk.be/health
          - https://seedbox.wiserisk.be
          - https://hermes.wiserisk.be
          - https://hades.wiserisk.be
          - https://hermes.syncthing.wiserisk.be
          - https://hades.syncthing.wiserisk.be
          - https://registry.k3s.wiserisk.be
          - https://flaresolverr.k3s.wiserisk.be
          - https://graylog.k3s.wiserisk.be
          - https://librespeed.k3s.wiserisk.be
          - https://nextcloud.k3s.wiserisk.be
          - https://sonarqube.k3s.wiserisk.be
          - https://auth.vps.wiserisk.be
      relabel_configs:
        - source_labels: [__address__]
          target_label: __param_target
        - source_labels: [__param_target]
          target_label: instance
        - target_label: __address__
          replacement: blackbox-exporter.monitoring.svc.cluster.local:9115
    - job_name: 'blackbox-authelia'
      metrics_path: /probe
      params:
        module: [http_2xx_authelia]
      static_configs:
        - targets:
          - https://adguard.vps.wiserisk.be
          - https://unbound.vps.wiserisk.be
          - https://wireguard.vps.wiserisk.be
          - https://traefik.vps.wiserisk.be
          - https://lldap.vps.wiserisk.be
          - https://git.wiserisk.be
          - https://semaphore.wiserisk.be
          - https://argocd.k3s.wiserisk.be
          - https://vault.k3s.wiserisk.be
          - https://grafana.k3s.wiserisk.be
          - https://portainer.k3s.wiserisk.be
          - https://hlabmonitor.k3s.wiserisk.be/actuator/health
          - https://ai.k3s.wiserisk.be
          - https://prowlarr.k3s.wiserisk.be
          - https://adguard.wiserisk.be
          - https://gatus.wiserisk.be
          - https://gatus.vps.wiserisk.be
          - https://traefik.wiserisk.be
          - https://traefik.k3s.wiserisk.be
      relabel_configs:
        - source_labels: [__address__]
          target_label: __param_target
        - source_labels: [__param_target]
          target_label: instance
        - target_label: __address__
          replacement: blackbox-exporter.monitoring.svc.cluster.local:9115
    - job_name: 'blackbox-bearer'
      metrics_path: /probe
      params:
        module: [http_2xx_bearer]
      static_configs:
        - targets:
          - https://ollama.wiserisk.be
      relabel_configs:
        - source_labels: [__address__]
          target_label: __param_target
        - source_labels: [__param_target]
          target_label: instance
        - target_label: __address__
          replacement: blackbox-exporter.monitoring.svc.cluster.local:9115
    - job_name: 'blackbox-local'
      metrics_path: /probe
      params:
        module: [http_2xx_insecure]
      static_configs:
        - targets:
          - https://flash.ilo.wiserisk.home
          - https://hades.ilo.wiserisk.home
          - https://ha.wiserisk.home
          - https://adguard.wiserisk.home
          - https://pbs.wiserisk.home
          - https://jellyfin.wiserisk.home/health
          - https://pve.wiserisk.home
          - https://flash.pve.wiserisk.home
          - https://wasp.pve.wiserisk.home
          - https://qbittorrent.wiserisk.home
          - https://seedbox.wiserisk.home
          - https://traefik.wiserisk.home
          - https://hermes.wiserisk.home
          - https://hades.wiserisk.home
          - https://hermes.syncthing.wiserisk.home
          - https://hades.syncthing.wiserisk.home
          - https://ollama.wiserisk.home
          - https://git.wiserisk.home
          - https://semaphore.wiserisk.home
          - https://adguard.vps.wiserisk.home
          - https://registry-ui.k3s.wiserisk.home
          - https://traefik.k3s.wiserisk.home
          - https://alertmanager.k3s.wiserisk.home
          - https://blackbox.k3s.wiserisk.home
          - https://ksm.k3s.wiserisk.home
          - https://prometheus.k3s.wiserisk.home
          - https://ai.k3s.wiserisk.home
          - https://prowlarr.k3s.wiserisk.home
          - https://argocd.k3s.wiserisk.home
          - https://flaresolverr.k3s.wiserisk.home
          - https://gatus.wiserisk.home
          - https://grafana.k3s.wiserisk.home
          - https://graylog.k3s.wiserisk.home
          - https://hlabmonitor.k3s.wiserisk.home
          - https://librespeed.k3s.wiserisk.home
          - https://nextcloud.k3s.wiserisk.home
          - https://portainer.k3s.wiserisk.home
          - https://registry.k3s.wiserisk.home
          - https://sonarqube.k3s.wiserisk.home
          - https://vault.k3s.wiserisk.home
          - https://webhook.wiserisk.home
      relabel_configs:
        - source_labels: [__address__]
          target_label: __param_target
        - source_labels: [__param_target]
          target_label: instance
        - target_label: __address__
          replacement: blackbox-exporter.monitoring.svc.cluster.local:9115
    - job_name: 'blackbox-ping'
      metrics_path: /probe
      params:
        module: [icmp]
      static_configs:
        - targets:
          # Network
          - 10.0.0.1     # asuswrt_merlin
          - 10.0.0.75    # zyxel_xgs1250
          # iLO
          - 10.0.0.45    # ilo_flash
          # Proxmox / PBS
          - 10.0.0.80    # pbs
          - 10.0.0.81    # proxmox_flash
          - 10.0.0.82    # proxmox_wasp
          # Traefik LXC
          - 10.0.0.192   # traefik_flash
          - 10.100.0.2   # traefik_flash internal
          - 10.0.0.182   # traefik_wasp
          - 10.100.0.1   # traefik_wasp internal
          # AdGuard LXC
          - 10.0.0.191   # adguard_flash
          - 10.0.0.181   # adguard_wasp
          # Unbound LXC
          - 10.0.0.190   # unbound_flash
          - 10.0.0.180   # unbound_wasp
          # HAOS
          - 10.0.0.95    # home_assistant
          # TrueNAS
          - 10.100.0.10  # truenas_hermes
          # LXC tools
          - 10.100.0.100 # gitea
          - 10.100.0.101 # semaphore
          - 10.100.0.102 # gatus
          - 10.100.0.103 # webhook
          - 10.100.0.104 # ollama
          - 10.100.0.105 # qbittorrent
          # K3S
          - 10.100.0.151 # k3s_master
          - 10.100.0.152 # k3s_worker
          # VMs
          - 10.100.0.201 # seedbox
          - 10.100.0.202 # jellyfin
          - 10.100.0.220 # tailscale
          # VPS
          - 77.90.52.180 # debian_vps
          # Others
          - 10.0.0.49    # P1
          - 10.0.0.142   # Shelly
          - 10.0.0.185   # APC
          
      relabel_configs:
        - source_labels: [__address__]
          target_label: __param_target
        - source_labels: [__param_target]
          target_label: instance
        - target_label: __address__
          replacement: blackbox-exporter.monitoring.svc.cluster.local:9115
    - job_name: 'pve_flash'
      static_configs:
        - targets:
          - 10.0.0.81
      metrics_path: /pve
      params:
        module: [flash]
      relabel_configs:
        - source_labels: [__address__]
          target_label: __param_target
        - source_labels: [__param_target]
          target_label: instance
        - target_label: __address__
          replacement: proxmox-exporter.monitoring.svc.cluster.local:9221
    - job_name: 'pve_wasp'
      static_configs:
        - targets:
          - 10.0.0.82
      metrics_path: /pve
      params:
        module: [wasp]
      relabel_configs:
        - source_labels: [__address__]
          target_label: __param_target
        - source_labels: [__param_target]
          target_label: instance
        - target_label: __address__
          replacement: proxmox-exporter.monitoring.svc.cluster.local:9221
    - job_name: 'speedtest-exporter'
      static_configs:
        - targets:
          - speedtest-exporter-svc.monitoring.svc.cluster.local:9798
      metrics_path: /metrics
      scrape_interval: 5m
      scrape_timeout: 3m