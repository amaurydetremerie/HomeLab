# Port 80 : redirection globale HTTPS (le VPS Traefik Edge gère tout le TLS)
# Port 443 : TLS terminé ici avec le wildcard OVH, forward HTTP vers traefik_wasp
#
# Note : traefik_wasp doit être mis à jour pour ne servir qu'en HTTP (port 80),
# sans redirect-to-https ni ACME — le TLS est désormais entièrement géré par le VPS.
# traefik_flash pareil quand il sera ajouté.

http:
  services:
    traefik-internal:
      loadBalancer:
        servers:
          - url: "http://10.8.0.2"

  routers:
    redirect-all-http:
      rule: "PathPrefix(`/`)"
      entryPoints:
        - web
      middlewares:
        - redirect-to-https@file
      service: noop@internal

    # Services incompatibles avec Authelia (apps mobiles, API)
    # K3S : seuls les services avec leur propre auth ou usage API externe bypasse Authelia
    # Gitea/Semaphore : auth propre (LLDAP), Authelia bloque les automatisations API
    bypass-auth:
      rule: >-
        Host(`git.wiserisk.be`) ||
        Host(`semaphore.wiserisk.be`) ||
        Host(`ha.wiserisk.be`) ||
        Host(`jellyfin.wiserisk.be`) ||
        Host(`ollama.wiserisk.be`) ||
        Host(`k3s.wiserisk.be`) ||
        Host(`registry.k3s.wiserisk.be`) ||
        Host(`flaresolverr.k3s.wiserisk.be`) ||
        Host(`graylog.k3s.wiserisk.be`) ||
        Host(`librespeed.k3s.wiserisk.be`) ||
        Host(`nextcloud.k3s.wiserisk.be`) ||
        Host(`sonarqube.k3s.wiserisk.be`)
      entryPoints:
        - websecure
      service: traefik-internal@file
      tls:
        certResolver: letsencrypt-ovh

    catchall-secure:
      rule: "HostRegexp(`.+`)"
      entryPoints:
        - websecure
      middlewares:
        - authelia@file
      service: traefik-internal@file
      priority: 1
      tls:
        certResolver: letsencrypt-ovh